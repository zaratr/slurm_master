name: Slurm Lab CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 50

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build and test Slurm lab
        run: bash scripts/ci-smoke-test.sh

      - name: Collect Compose logs
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt || true
          docker compose logs --no-color > artifacts/compose-logs.txt || true
          docker compose exec -T -u hpcuser login bash -lc 'sinfo; squeue; sacct -X --format=JobID,JobName,State,ExitCode,Elapsed,AllocCPUS' > artifacts/slurm-state.txt || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: slurm-lab-failure-logs
          path: artifacts/

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
